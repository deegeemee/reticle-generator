@if (reticle$ | async; as reticle) {
<svg [attr.viewBox]="'0 0 ' + reticle.size + ' ' + reticle.size" xmlns="http://www.w3.org/2000/svg">
  @for (axis of reticle.axis; track $index) { @if (axis.enabled) {
  <ng-container *ngTemplateOutlet="svgAxis; context: { reticle, axis }"></ng-container>
  } }
</svg>
}

<ng-template #svgAxis let-reticle="reticle" let-axis="axis">
  <svg:g [attr.transform]="'rotate(' + axis.angle + ' ' + reticle.size / 2 + ' ' + reticle.size / 2 + ')'">
    <ng-container *ngTemplateOutlet="svgAxisLine; context: { reticle, axis }"></ng-container>
    @for (section of axis.sections; track $index) {
    <ng-container *ngTemplateOutlet="svgAxisSections; context: { reticle, axis, section }"></ng-container>
    }
  </svg:g>
</ng-template>

<ng-template #svgAxisLine let-reticle="reticle" let-axis="axis">
  <svg:line
    [attr.x1]="axis.offsetStart"
    [attr.y1]="reticle.size / 2"
    [attr.x2]="reticle.size - axis.offsetEnd"
    [attr.y2]="reticle.size / 2"
    [attr.stroke-width]="axis.strokeWidth"
    stroke="black" />
</ng-template>

<ng-template #svgAxisSections let-reticle="reticle" let-axis="axis" let-section="section">
  @if (getAxisSections(reticle, axis, section); as sections) { @for (lineAttr of sections; track lineAttr.id) {
  <svg:line
    [attr.x1]="lineAttr.x1"
    [attr.y1]="lineAttr.y1"
    [attr.x2]="lineAttr.x2"
    [attr.y2]="lineAttr.y2"
    [attr.stroke-width]="lineAttr.stokeWidth"
    stroke="black" />
  } }
</ng-template>
